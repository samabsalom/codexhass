name: Validate

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build add-on image
        run: docker build --build-arg BUILD_FROM=ghcr.io/home-assistant/amd64-base:latest -t codex-terminal ./codex_terminal

      - name: Verify Codex CLI is available
        run: docker run --rm --entrypoint codex codex-terminal --version

      - name: Verify zsh and tmux defaults
        run: |
          docker run --rm --entrypoint sh codex-terminal -lc '
            tmp=$(mktemp -d)
            mkdir -p "$tmp/home"
            cp /opt/codex-terminal-defaults/zshrc "$tmp/home/.zshrc"
            HOME="$tmp/home" zsh -ic "echo ZSH_OK >/dev/null && tmux -V >/dev/null"
          '

      - name: Smoke test terminal
        run: |
          mkdir -p "$RUNNER_TEMP/codex-terminal-data"
          docker run -d --name codex-terminal-test -p 7681:7681 -v "$RUNNER_TEMP/codex-terminal-data:/data" codex-terminal
          sleep 3
          curl -fsS http://127.0.0.1:7681/ | grep -q '<title>ttyd - Terminal</title>'
          docker rm -f codex-terminal-test
